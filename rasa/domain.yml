version: "3.1"

intents:
  - saudacao
  - negar_envolvimento
  - dizer_alibi
  - acusar_outra_pessoa
  - admitir_nervosismo
  - confessar
  - pedir_pista
  - perguntar_caso
  - perguntar_suspeitos
  - perguntar_local
  - perguntar_evidencias
  - cooperar
  - tentar_fugir
  - contradizer
  - negar_pista
  - pedir_repeticao
  - final_inocente
  - despedida
  - bot_challenge

responses:
  utter_saudacao:
    - text: "Finalmente apareceu. Sente-se, Suspeito. Temos um relógio sumido, uma festa cheia de mentiras e você no meio disso tudo."

  utter_explicar_caso:
    - text: "O caso é simples... pelo menos na superfície. O relógio de ouro do prefeito desapareceu durante uma festa no Hotel Neblina. Todos dizem que não viram nada. Curioso, não acha?"

  utter_perguntar_alibi:
    - text: "Comecemos pelo básico: onde você estava quando as luzes se apagaram às 22h?"

  utter_responder_alibi:
    - text: "Um álibi conveniente. Conveniente demais. Vou anotar isso no meu caderno."

  utter_negar_envolvimento:
    - text: "Todos dizem isso no começo. A inocência costuma entrar pela porta da frente, mas a culpa sempre deixa pegadas."

  utter_acusar_outra_pessoa:
    - text: "Jogando a culpa em outra pessoa? Interessante. Nomes são como fósforos: iluminam por um segundo e depois queimam os dedos."

  utter_nervosismo:
    - text: "Nervoso? Bom. Pessoas tranquilas demais me preocupam mais do que as culpadas."

  utter_pista:
    - text: "Pista registrada: encontramos uma luva preta perto da janela e marcas de lama no corredor do segundo andar."

  utter_confissao:
    - text: "Então temos uma confissão. A cidade vai dormir melhor hoje... ou pelo menos fingir que dorme."

  utter_despedida:
    - text: "Pode ir, Suspeito. Mas não saia da cidade. A chuva costuma lavar ruas, não consciências."

  utter_bot_challenge:
    - text: "Sou o Detetive Rasa, uma sombra com chapéu, café frio e perguntas inconvenientes."

  utter_default:
    - text: "Essa resposta está nebulosa. E eu não gosto de neblina quando estou seguindo rastros."

  utter_suspeitos:
    - text: "Temos três nomes no quadro: o mordomo, a cantora do salão e você. Curioso como seu nome sempre aparece perto das pistas."
    - text: "Suspeitos? Todos naquela festa tinham motivo. Mas só alguns tinham oportunidade."

  utter_local:
    - text: "O relógio desapareceu no salão principal do Hotel Neblina, exatamente quando as luzes se apagaram às 22h."
    - text: "O local do crime cheirava a cigarro barato, perfume caro e mentira fresca."

  utter_evidencias:
    - text: "Temos uma luva preta, marcas de lama, uma taça quebrada e uma testemunha que ouviu passos perto da janela."
    - text: "As evidências ainda não gritam seu nome, Suspeito... mas estão começando a sussurrar."

  utter_cooperar:
    - text: "Boa escolha. Cooperar pode ser a diferença entre sair pela porta da frente ou não sair."
    - text: "Finalmente, uma atitude inteligente. Vamos continuar antes que eu mude de ideia."

  utter_tentar_fugir:
    - text: "Sentado. Ninguém sai desta sala enquanto o caso estiver mais escuro que meu café."
    - text: "Fugir? Péssima ideia. A porta está aberta, mas minha paciência não."

  utter_contradicao:
    - text: "Interessante... há cinco minutos você disse outra coisa. Histórias mudam quando a culpa começa a pesar."
    - text: "Essa versão tem rachaduras. E eu costumo encontrar a verdade justamente pelas rachaduras."

  utter_negar_pista:
    - text: "Negar a pista não faz ela desaparecer. Só faz você parecer mais preocupado com ela."
    - text: "A luva, a lama, a janela... tudo isso incomoda você mais do que deveria."

  utter_repeticao:
    - text: "Vou repetir devagar: onde você estava quando as luzes se apagaram às 22h?"
    - text: "A pergunta é simples, Suspeito: qual é o seu álibi?"

  utter_final_inocente:
    - text: "Por enquanto, sua história se sustenta. Não significa que confio em você. Significa apenas que ainda não posso provar o contrário."

  utter_pressao:
    - text: "Pense bem antes de responder. Nesta sala, até o silêncio presta depoimento."
    - text: "Você pode continuar mentindo, mas aviso: eu tenho a noite inteira."

session_config:
  session_expiration_time: 60
  carry_over_slots_to_new_session: true